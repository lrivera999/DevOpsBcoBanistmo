trigger:
  branches:
    include:
      - release

pr:
  branches:
    include:
      - test
      - release

pool:
  name: 'linux-selfhosted-4-demo'

variables:
  nodeVersion: '20.x'
  appFolder: '.'
  buildFolder: 'dist'

stages:
  - stage: Validate_PR
    displayName: 'Validate pull requests'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: Lint_Test_Build_PR
        displayName: 'Lint, Test and Build (PR)'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: 'Use Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: npm ci
            workingDirectory: $(appFolder)
            displayName: 'Install dependencies'

          - script: npm run lint
            workingDirectory: $(appFolder)
            displayName: 'Run linter'

          - script: npm run test:coverage
            workingDirectory: $(appFolder)
            displayName: 'Run tests with coverage'

          - script: npm run build
            workingDirectory: $(appFolder)
            displayName: 'Build app'

  - stage: Validate_Release
    displayName: 'Validate release with SonarQube'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/release'))
    jobs:
      - job: Lint_Test_Build_Sonar
        displayName: 'Lint, Test, Build and SonarQube'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: 'Use Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: npm ci
            workingDirectory: $(appFolder)
            displayName: 'Install dependencies'

          - script: npm run lint
            workingDirectory: $(appFolder)
            displayName: 'Run linter'

          - script: npm run test:coverage
            workingDirectory: $(appFolder)
            displayName: 'Run tests with coverage'

          - task: SonarQubePrepare@7
            displayName: 'Prepare SonarQube analysis'
            inputs:
              SonarQube: 'sonarqube-service-connection'
              scannerMode: 'cli'
              configMode: 'manual'
              cliProjectKey: 'dog-carousel'
              cliProjectName: 'dog-carousel'
              cliSources: '$(appFolder)'
              extraProperties: |
                sonar.sourceEncoding=UTF-8
                sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
                sonar.test.inclusions=**/*.test.*,**/*.spec.*
                sonar.javascript.lcov.reportPaths=$(appFolder)/coverage/lcov.info

          - script: npm run build
            workingDirectory: $(appFolder)
            displayName: 'Build app'

          - task: SonarQubeAnalyze@7
            displayName: 'Run SonarQube analysis'

          - task: SonarQubePublish@7
            displayName: 'Publish quality gate'
            inputs:
              pollingTimeoutSec: '300'

  - stage: Deploy_Production
    displayName: 'Deploy to Azure Static Web Apps'
    dependsOn: Validate_Release
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/release'))
    jobs:
      - job: Deploy
        displayName: 'Deploy static site'
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              npm ci
              npm run build
            workingDirectory: $(appFolder)
            displayName: 'Build app for deployment'

          - task: AzureStaticWebApp@0
            displayName: 'Deploy to Azure Static Web App'
            inputs:
              app_location: '$(appFolder)/$(buildFolder)'
              output_location: ''
              skip_app_build: true
              azure_static_web_apps_api_token: '$(AZURE_STATIC_WEB_APPS_API_TOKEN)'