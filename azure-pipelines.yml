trigger:
  branches:
    include:
      - main
      - release

pr:
  branches:
    include:
      - test
      - release

pool:
  name: "sonar-vm-pool"

variables:
  - group: dog-carousel-variables
  - name: nodeVersion
    value: "20.x"
  - name: appFolder
    value: "."
  - name: buildFolder
    value: "dist"

stages:
  - stage: Validate
    displayName: "Validate code"
    jobs:
      - job: Lint_Test_Build
        displayName: "Lint, test and build"
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Use Node.js"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: npm ci
            workingDirectory: $(appFolder)
            displayName: "Install dependencies"

          - script: npm run lint
            workingDirectory: $(appFolder)
            displayName: "Run linter"

          - script: npm run test:coverage
            workingDirectory: $(appFolder)
            displayName: "Run tests with coverage"

          - script: npm run build
            workingDirectory: $(appFolder)
            displayName: "Build app"

          - script: |
              sonar-scanner \
                -Dsonar.projectKey=dog-carousel \
                -Dsonar.projectName=dog-carousel \
                -Dsonar.sources=src \
                -Dsonar.tests=src \
                -Dsonar.test.inclusions=**/*.test.*,**/*.spec.* \
                -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/** \
                -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
                -Dsonar.sourceEncoding=UTF-8 \
                -Dsonar.host.url="$SONAR_HOST_URL" \
                -Dsonar.token="$SONAR_TOKEN"
            workingDirectory: $(appFolder)
            displayName: "Run SonarScanner manually"
            env:
              SONAR_HOST_URL: $(SONAR_HOST_URL)
              SONAR_TOKEN: $(SONAR_TOKEN)
            condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  - stage: Deploy
    displayName: "Deploy to Azure Static Web Apps"
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/release'))
    jobs:
      - job: Deploy_Static_Site
        displayName: "Deploy static site"
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Use Node.js"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: |
              npm ci
              npm run build
            workingDirectory: $(appFolder)
            displayName: "Build app for deployment"

          - task: AzureStaticWebApp@0
            displayName: "Deploy to Azure Static Web App"
            inputs:
              app_location: "$(appFolder)/$(buildFolder)"
              output_location: ""
              skip_app_build: true
              azure_static_web_apps_api_token: "$(AZURE_STATIC_WEB_APPS_API_TOKEN)"
