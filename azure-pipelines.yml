trigger:
  branches:
    include:
      - main
      - release

pr:
  branches:
    include:
      - test
      - release

pool:
  name: "sonar-vm-pool"

variables:
  nodeVersion: "20.x"
  appFolder: "."
  buildFolder: "dist"

stages:
  - stage: Validate_PR
    displayName: "Validate pull requests"
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: Lint_Test_Build_PR
        displayName: "Lint, Test and Build (PR)"
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Use Node.js"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: npm ci
            workingDirectory: $(appFolder)
            displayName: "Install dependencies"

          - script: npm run lint
            workingDirectory: $(appFolder)
            displayName: "Run linter"

          - script: npm run test:coverage
            workingDirectory: $(appFolder)
            displayName: "Run tests with coverage"

          - script: npm run build
            workingDirectory: $(appFolder)
            displayName: "Build app"

  - stage: Validate_Main_With_Sonar
    displayName: "Validate main with SonarQube"
    condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Lint_Test_Build_Sonar
        displayName: "Lint, Test, Build and SonarQube"
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Use Node.js"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: npm ci
            workingDirectory: $(appFolder)
            displayName: "Install dependencies"

          - script: npm run lint
            workingDirectory: $(appFolder)
            displayName: "Run linter"

          - script: npm run test:coverage
            workingDirectory: $(appFolder)
            displayName: "Run tests with coverage"

          - script: npm run build
            workingDirectory: $(appFolder)
            displayName: "Build app"

          - script: |
              sonar-scanner \
                -Dsonar.projectKey=dog-carousel \
                -Dsonar.projectName=dog-carousel \
                -Dsonar.sources=src \
                -Dsonar.tests=src \
                -Dsonar.test.inclusions=**/*.test.*,**/*.spec.* \
                -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/** \
                -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
                -Dsonar.sourceEncoding=UTF-8 \
                -Dsonar.host.url="$SONAR_HOST_URL" \
                -Dsonar.token="$SONAR_TOKEN"
            workingDirectory: $(appFolder)
            displayName: "Run SonarScanner manually"
            env:
              SONAR_HOST_URL: $(SONAR_HOST_URL)
              SONAR_TOKEN: $(SONAR_TOKEN)

  - stage: Validate_Release
    displayName: "Validate release"
    condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/release'))
    jobs:
      - job: Lint_Test_Build_Release
        displayName: "Lint, Test and Build (release)"
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Use Node.js"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: npm ci
            workingDirectory: $(appFolder)
            displayName: "Install dependencies"

          - script: npm run lint
            workingDirectory: $(appFolder)
            displayName: "Run linter"

          - script: npm run test:coverage
            workingDirectory: $(appFolder)
            displayName: "Run tests with coverage"

          - script: npm run build
            workingDirectory: $(appFolder)
            displayName: "Build app"

  - stage: Deploy_Production
    displayName: "Deploy to Azure Static Web Apps"
    dependsOn: Validate_Release
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/release'))
    jobs:
      - job: Deploy
        displayName: "Deploy static site"
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Use Node.js"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: |
              npm ci
              npm run build
            workingDirectory: $(appFolder)
            displayName: "Build app for deployment"

          - task: AzureStaticWebApp@0
            displayName: "Deploy to Azure Static Web App"
            inputs:
              app_location: "$(appFolder)/$(buildFolder)"
              output_location: ""
              skip_app_build: true
              azure_static_web_apps_api_token: "$(AZURE_STATIC_WEB_APPS_API_TOKEN)"